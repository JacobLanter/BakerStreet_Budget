<!DOCTYPE html>
<html>
<head>
  <title>Login | BakerStreet Budget</title>
</head>
<body>
  <h1>BakerStreet Budget Login</h1>

  {% if form.errors %}
    <p style="color: red;">Invalid username or password.</p>
  {% endif %}

  <form method="post">
    {% csrf_token %}

    <p>
      <label for="id_username">Username:</label>
      {{ form.username }}
    </p>

    <p>
      <label for="id_password">Password:</label>
      {{ form.password }}
    </p>

    <button type="submit">Log in</button>
  </form>
</body>
</html>
