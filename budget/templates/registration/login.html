<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | BakerStreet Budget</title>

  <style>
    :root {
      --page-bg: #f2f8f3;
      --panel-bg: #ffffff;
      --ink: #16251b;
      --muted: #647369;
      --line: #d5e4d8;
      --accent: #2f7d32;
      --accent-dark: #1f5f24;
      --accent-soft: #e7f4e8;
      --danger: #b42318;
      --danger-soft: #fee4e2;
      --shadow: 0 18px 45px rgba(24, 75, 39, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, #e6f3e7 0, var(--page-bg) 360px),
        var(--page-bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    .login-shell {
      display: grid;
      place-items: center;
      width: min(100% - 32px, 1180px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 36px 0;
    }

    .login-panel {
      width: min(100%, 430px);
      padding: 32px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(213, 228, 216, 0.9);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 10px;
      font-size: clamp(2rem, 5vw, 2.75rem);
      line-height: 1.05;
    }

    .login-intro {
      margin-bottom: 24px;
      color: var(--muted);
    }

    .error-message {
      margin-bottom: 20px;
      padding: 12px 14px;
      color: var(--danger);
      background: var(--danger-soft);
      border: 1px solid rgba(180, 35, 24, 0.18);
      border-radius: 8px;
      font-weight: 700;
    }

    .form-field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: #344054;
      font-weight: 700;
    }

    input {
      width: 100%;
      min-height: 46px;
      padding: 10px 12px;
      color: var(--ink);
      background: #fbfcfe;
      border: 1px solid var(--line);
      border-radius: 8px;
      font: inherit;
    }

    input:focus-visible {
      outline: 3px solid rgba(47, 125, 50, 0.26);
      outline-offset: 2px;
      border-color: var(--accent);
    }

    button {
      width: 100%;
      min-height: 48px;
      margin-top: 8px;
      padding: 13px 20px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #ffffff;
      box-shadow: 0 10px 20px rgba(47, 125, 50, 0.18);
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      transition: background 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    button:hover {
      background: var(--accent-dark);
      box-shadow: 0 14px 24px rgba(47, 125, 50, 0.22);
      transform: translateY(-1px);
    }

    button:focus-visible {
      outline: 3px solid rgba(47, 125, 50, 0.26);
      outline-offset: 2px;
    }

    @media (max-width: 520px) {
      .login-shell {
        width: min(100% - 22px, 1180px);
        padding: 24px 0;
      }

      .login-panel {
        padding: 24px 18px;
      }
    }
  </style>
</head>
<body>
  <main class="login-shell">
    <section class="login-panel" aria-labelledby="login-heading">
      <p class="eyebrow">BakerStreet Budget</p>
      <h1 id="login-heading">Log In</h1>
      <p class="login-intro">Access your goals dashboard and budget categories.</p>

      {% if form.errors %}
        <p class="error-message">Invalid username or password.</p>
      {% endif %}

      <form method="post">
        {% csrf_token %}

        <div class="form-field">
          <label for="id_username">Username</label>
          {{ form.username }}
        </div>

        <div class="form-field">
          <label for="id_password">Password</label>
          {{ form.password }}
        </div>

        <button type="submit">Log In</button>
      </form>
    </section>
  </main>
</body>
</html>
